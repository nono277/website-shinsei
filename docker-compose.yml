version: '3.8'
services:
  shinsei-web:
    build: .
    container_name: shinsei-web
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env            # secrets Microsoft/Brevo + VOTE_REWARD_TOKEN/URL
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Pas de proxy devant Docker → getClientAddress() lit l'IP du socket TCP directement
      - DB_PATH=/data/votes.db
    volumes:
      - votes_data:/data

volumes:
  votes_data:
