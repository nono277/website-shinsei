version: '3.8'
services:
  shinsei-web:
    build: .
    container_name: shinsei-web
    ports:
      - "127.0.0.1:3000:3000"
    restart: always
    env_file:
      - .env            # secrets Microsoft/Brevo + VOTE_REWARD_TOKEN/URL
    environment:
      - PORT=3000
      - NODE_ENV=production
      # nginx reverse proxy → transmet la vraie IP client via X-Real-IP
      - ADDRESS_HEADER=x-real-ip
      - DB_PATH=/data/votes.db
    volumes:
      - votes_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"   # permet d'atteindre le daemon sur le host

volumes:
  votes_data:
